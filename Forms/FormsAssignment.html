<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Validation with Regular Expressions</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
      margin-top: 40px;
      color: #333;
    }

    form {
      max-width: 400px;
      margin: 20px auto 0 auto;
      padding: 20px;
      background-color: #fff;
      border-radius: 6px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.12);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    label {
      font-weight: bold;
      color: #333;
    }

    input[type="text"] {
      padding: 10px;
      font-size: 14px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button[type="submit"] {
      padding: 10px;
      font-size: 14px;
      color: #fff;
      background-color: #333;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button[type="submit"]:hover {
      opacity: 0.9;
    }

    #message {
      max-width: 400px;
      margin: 12px auto 0 auto;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h1>Form Validation with Regular Expressions</h1>

  <form id="myForm" action="#" method="post">
    <label for="inputField">Alphanumeric Input:</label>
    <input type="text" id="inputField" name="inputField" placeholder="Example: Diva123">
    <button type="submit">Submit</button>
  </form>

  <p id="message"></p>

  <script src="validationScript.js"></script>
</body>
</html>
